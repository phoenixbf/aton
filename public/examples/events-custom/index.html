<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="/res/aton-logo.png" sizes="512x512" type="image/png">

<!-- Add iOS meta tags and icons -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ATON Sample">
<link rel="apple-touch-icon" href="/res/aton-logo.png">
<meta name="description" content="ATON Sample">
<!-- Add meta theme-color -->
<meta name="theme-color" content="#000000" />

<title>ATON example</title>
<link rel="stylesheet" type="text/css" href="/vendors/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" type="text/css" href="/vendors/bootstrap/css/bootstrap-icons/font/bootstrap-icons.min.css">
<link rel="stylesheet" type="text/css" href="/res/css/main.css">

<script type="text/javascript" src="/vendors/vendors.min.js"></script>
<script type="text/javascript" src="/vendors/bootstrap/js/bootstrap.bundle.min.js"></script>

<script type="text/javascript" src="/dist/THREE.bundle.js"></script>

<!-- <script type="module" src="/dist/ATON.min.js"></script> -->
<script type="module" src="/src/ATON.js"></script>

<script>
window.addEventListener( 'load', ()=>{

	// Realize base ATON and add base UI events
    ATON.realize();
    ATON.UI.addBasicEvents();

    // Sample ground
    //ATON.createSceneNode("ground").load("samples/models/basic/aton-ground.gltf").setScale(10.0).attachToRoot();

    ATON.App.loadScene("samples/welcome");

	// When pressing 'x' we'll fire OUR custom local event "myEvent"
	// Data of our event will be the current queried point (surface) on visible scene
	ATON.on("KeyPress", (k)=>{
		if (k === 'x') ATON.fire("myEvent", ATON.getSceneQueriedPoint());
	});

    // Also, on tap/click we fire the same custom event
	ATON.on("Tap", ()=>{
		ATON.fire("myEvent", ATON.getSceneQueriedPoint());
	});

	// ...and here we handle our custom event!
	ATON.on("myEvent", (p)=>{
		if (!p) return; // no valid point, nothing to do

		let N = ATON.createSceneNode()
			.load("samples/models/atoncube.glb")
			.setPosition(p)
			.attachToRoot();

        N.position.y += 0.5; // adjust offset
	});


    // Setup some UI
    // Append a few prefab UI buttons to our main toolbar
	ATON.UI.get("toolbar").append(
        ATON.UI.createButtonHome(),
        ATON.UI.createButtonVR(),   // VR button will show up only on secure connections and supported devices
    );

    // Create a button to open side panel
    ATON.UI.get("side").append(
        ATON.UI.createButton({
            icon: "help",
            onpress: openSidePanel
        })
    );

    openSidePanel();
});

// Routine to open a sidepanel with some info
let openSidePanel = ()=>{
    ATON.UI.showSidePanel({
        header: "Basic Events",
        body: ATON.UI.elem(`
        <p>In this sample we load a basic scene and fire our custom event "myEvent" when pressing 'x' key or when clicking/tapping on a surface, using:
        <code>ATON.fire("myEvent", data)</code><br>

        where <b>data</b> will contain current queried scene surface location (if any).<br>
        We then listen to our event via:
        <code>ATON.on("myEvent", data)</code>

        In this case, we use data to create a new ATON node (a cube) in the location received.
        </p>`)
    });
};

</script>
</head>

<body>
    <div id="toolbar" class="aton-toolbar-top"></div>
    <div id="side" class="aton-toolbar-bottom" style="position: absolute; right: 0px;"></div>

    <div class="aton-poweredby" >
        Powered by <a href="https://aton.ispc.cnr.it/site/" target="_blank">ATON</a>
    </div>
</body>
